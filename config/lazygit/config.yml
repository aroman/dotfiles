git:
  pagers:
    - colorArg: always
      pager: delta --paging=never
gui:
  theme:
    activeBorderColor:
      - "#67b0e8"
      - bold
    inactiveBorderColor:
      - "#464e50"
    optionsTextColor:
      - "#67b0e8"
    selectedLineBgColor:
      - "#232a2d"
    selectedRangeBgColor:
      - "#3f515a"
    cherryPickedCommitBgColor:
      - "#3f515a"
    cherryPickedCommitFgColor:
      - "#8ccf7e"
    unstagedChangesColor:
      - "#e57474"
    defaultFgColor:
      - "#dadada"
    searchingActiveBorderColor:
      - "#e5c76b"
customCommands:
  - key: "<c-a>"
    description: "AI commit message"
    context: "files"
    command: "bash -c 'diff=$(git diff --cached); if [ -z \"$diff\" ]; then echo \"No staged changes.\"; read -n1; exit 1; fi; msg=$(echo \"$diff\" | head -c 50000 | claude -p --no-session-persistence --model haiku --tools \"\" --system-prompt \"Write a single-line git commit message for this diff. Be concise and specific. Use imperative mood. Output ONLY the message, no quotes, no explanation, no markdown, no trailing period.\"); if [ -z \"$msg\" ]; then echo \"Failed to generate message.\"; read -n1; exit 1; fi; echo \"$msg\" > .git/COMMIT_EDITMSG_AI; git commit -e -F .git/COMMIT_EDITMSG_AI; rm -f .git/COMMIT_EDITMSG_AI'"
    output: terminal
