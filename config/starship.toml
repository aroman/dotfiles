[directory]
fish_style_pwd_dir_length = 1
style = "bold #67b0e8"

[character]
success_symbol = "[❯](#8ccf7e bold)"
error_symbol = "[❯](#e57474 bold)"

[git_branch]
style = "bold #c47fd5"

[git_status]
# Show working tree status and remote tracking as separate groups:
#   master [!?] [⇡4]   — dirty + 4 ahead
#   master [!]          — dirty, up to date
#   master [⇡4]        — clean, 4 ahead
format = "([\\[$all_status\\]](#e57474 bold) )([\\[$ahead_behind\\]](#e5c76b bold) )"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"

[status]
disabled = false
format = "[$status]($style) "
style = "#e57474"

[cmd_duration]
style = "#3b4548"

[nodejs]
style = "#8ccf7e"

[python]
style = "#e5c76b"

[rust]
style = "#e57474"

[package]
style = "#e5c76b"

[nix_shell]
style = "#67b0e8"

[gcloud]
disabled = true

[aws]
disabled = true
