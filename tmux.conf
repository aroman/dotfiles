set -g mouse on

# Disable alternate screen for real
set -ga terminal-overrides ',*:smcup@:rmcup@'

# Enter copy-mode on scroll-up, one line at a time
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X scroll-up" \
  "copy-mode -e; send-keys -X scroll-up"

# Line-by-line scrolling inside copy-mode (overrides default 5-line jump)
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
