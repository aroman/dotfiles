set -g mouse on

# Forward yanks/selections to the outer terminal's clipboard via OSC 52.
# With this, drag-select and copy-mode `y` land on the laptop clipboard
# even over SSH, with no plugin and no helper binary.
set -g set-clipboard on

# vi-style copy-mode, with `y` piping through copy-pipe-and-cancel so
# OSC 52 actually fires (tmux's default `y` skips that path on some versions).
setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Disable alternate screen for real
set -ga terminal-overrides ',*:smcup@:rmcup@'

# Truecolor passthrough. Outer TERM is xterm-ghostty; its terminfo advertises
# Tc but not RGB, so tmux strips 24-bit color unless we declare the feature.
set -as terminal-features ',xterm-ghostty:RGB'
set -as terminal-features ',xterm-256color:RGB'

# Enter copy-mode on scroll-up, one line at a time
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X scroll-up" \
  "copy-mode -e; send-keys -X scroll-up"

# Line-by-line scrolling inside copy-mode (overrides default 5-line jump)
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
